# Production VPS Hostinger
# Usage :
#   cp .env.example .env   # puis éditer DOMAIN, secrets, SMTP
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#   docker compose -f docker-compose.prod.yml exec server node src/jobs/seed.js

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Pas de ports publics — Mongo accessible uniquement depuis le réseau Docker
    networks:
      - btb
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/benin-top-builders}
      CLIENT_URL: ${CLIENT_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-30d}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-Bénin Top Builders <noreply@benintopbuilders.bj>}
      FSPAY_BASE_URL: ${FSPAY_BASE_URL:-}
      FSPAY_API_KEY: ${FSPAY_API_KEY:-}
      FSPAY_WEBHOOK_SECRET: ${FSPAY_WEBHOOK_SECRET}
      FSPAY_CALLBACK_URL: ${FSPAY_CALLBACK_URL}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      SEED_SUPERADMIN_EMAIL: ${SEED_SUPERADMIN_EMAIL:-}
      SEED_SUPERADMIN_PASSWORD: ${SEED_SUPERADMIN_PASSWORD:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - btb
    # API non exposée directement — uniquement via le reverse proxy client
    expose:
      - '5001'

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
        VITE_APP_NAME: ${VITE_APP_NAME:-Bénin Top Builders}
    restart: unless-stopped
    ports:
      - '${APP_HTTP_PORT:-8080}:80'
    depends_on:
      - server
    networks:
      - btb

  # Reverse proxy HTTPS automatique (Let's Encrypt)
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client
    networks:
      - btb

volumes:
  mongo_data:
  uploads_data:
  caddy_data:
  caddy_config:

networks:
  btb:
    driver: bridge
