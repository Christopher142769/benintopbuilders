# Développement / preview local uniquement.
# Le déploiement en production (Hostinger) n'utilise pas Docker :
# voir deploy/DEPLOY_HOSTINGER.md (Node + PM2 + Nginx natif).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'

  server:
    build: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGODB_URI: mongodb://mongo:27017/benin-top-builders
      CLIENT_URL: http://localhost:8080
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      JWT_ACCESS_SECRET: change-me-access-secret-min-32-chars!!
      JWT_REFRESH_SECRET: change-me-refresh-secret-min-32-chars!
      FSPAY_WEBHOOK_SECRET: change-me-fspay-webhook-secret
      MAIL_FROM: 'Bénin Top Builders <noreply@benintopbuilders.bj>'
    ports:
      - '5001:5001'
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/uploads

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: ''
        VITE_APP_NAME: Bénin Top Builders
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - server

volumes:
  mongo_data:
  uploads_data:
