# Config Nginx native — VPS Hostinger (sans Docker)
#
# Installation :
#   sudo cp deploy/nginx-hostinger.conf /etc/nginx/sites-available/benintopbuilders
#   sudo sed -i 's/__DOMAIN__/votredomaine.bj/g' /etc/nginx/sites-available/benintopbuilders
#   sudo ln -s /etc/nginx/sites-available/benintopbuilders /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d votredomaine.bj -d www.votredomaine.bj
#
# Certbot réécrira ce fichier pour ajouter le bloc HTTPS (443) automatiquement.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;

    # Adapter si le dépôt est cloné ailleurs que /opt/benintopbuilders
    root /opt/benintopbuilders/client/dist;
    index index.html;

    client_max_body_size 12m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5001/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
